                    - img [ref=e310]
                - paragraph [ref=e312]: Connect a GitHub account, get scored by an on-chain-aware oracle that reads your public contribution history, and borrow ETH against that reputation. Identity binding prevents the same GitHub account from minting fresh wallets to bypass exposure limits.
                - generic [ref=e313]:
                  - heading "Architecture" [level=2] [ref=e314]
                  - 'link "Permalink: Architecture" [ref=e315] [cursor=pointer]':
