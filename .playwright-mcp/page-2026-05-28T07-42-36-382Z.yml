                - list [ref=e318]:
                  - listitem [ref=e319]:
                    - strong [ref=e320]: Smart contract
                    - text: "- Solidity on Base Sepolia. Stores identity bindings (GitHub identity hash to wallet), credit scores, and loan state. Enforces collateral requirements by tier, tracks defaults permanently, caps aggregate exposure."
                  - listitem [ref=e321]:
                    - strong [ref=e322]: Frontend
                    - text: "- Next.js 15, Auth.js (GitHub OAuth), viem, deployed to Cloudflare Workers via OpenNext. Server-side oracle endpoint signs score submissions with a dedicated key."
                  - listitem [ref=e323]:
                    - strong [ref=e324]: Oracle
                    - text: "- Server-side route reads the authenticated GitHub session, scores public contribution history (repos, stars, commit frequency, account age), generates a proof nonce, and calls"
