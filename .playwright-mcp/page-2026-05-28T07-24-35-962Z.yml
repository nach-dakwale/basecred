          - heading "FAQ" [level=3] [ref=e129]
          - generic [ref=e130]:
            - paragraph [ref=e131]: What is the Base Sepolia Testnet Faucet?
            - paragraph [ref=e132]: If you're a blockchain developer looking to start building on the Base network, our powerful faucet is an straightforward way to receive Base testnet tokens and begin your web3 development journey. With our Base testnet faucet, you can request tokens with ease and speed, allowing you to focus on developing and testing your smart contracts and applications without worrying about the complexities of obtaining tokens.
          - generic [ref=e133]:
            - paragraph [ref=e134]: What is Blast?
            - paragraph [ref=e135]: BLAST is a multichain, subscription-based, API platform, featuring the fastest and most reliable blockchain access to the most relevant networks in the space. Using Blast, blockchain developers are able to bypass all the hurdles involved in running their own infrastructure, thus reducing both their outage risks and infrastructure costs.
          - generic [ref=e136]:
            - paragraph [ref=e137]: How is this faucet working?
            - paragraph [ref=e138]: The faucet is a powerful tool that helps you unleash the full potential of the Web3 space. In order to use the faucet, enter your wallet address in the provided box and click on the "Claim" button. By doing so, you will receive a drip of tokens which can be used to explore the possibilities of Web3 space. It's important to keep in mind that you can only claim once per 24 hours. You can also request extra funds by sending a tweet using the provided template and pasting the tweet's URL. This enables you to obtain more tokens and enhance your experience within the Web3 environment.
          - generic [ref=e139]:
            - paragraph [ref=e140]: What happens if the daily total allocation is filled?
            - paragraph [ref=e141]: If the daily total allocation is filled, users will not be able to claim additional tokens until the next 24-hour cycle begins. The daily total allocation serves as a limit on the number of tokens that can be claimed by all users within a 24-hour period, and once that limit is reached, the faucet will stop dripping tokens.
          - generic [ref=e142]:
            - paragraph [ref=e143]: What if the faucet doesn't work?
