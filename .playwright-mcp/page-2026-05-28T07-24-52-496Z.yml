      - generic [ref=e51]:
        - generic [ref=e53]:
          - heading "FAQs" [level=3] [ref=e54]
          - heading "Understanding faucets" [level=2] [ref=e55]
        - list [ref=e56]:
          - listitem [ref=e57]:
            - button "What is a testnet faucet?" [expanded] [ref=e58] [cursor=pointer]:
              - generic [ref=e59]:
                - generic [ref=e60]: What is a testnet faucet?
                - img [ref=e62]
            - generic [ref=e65]: A testnet faucet provides developers with free test tokens for deploying, testing, and optimizing smart contracts on test blockchain networks such as Sepolia and Amoy. Smart contracts on public (mainnet) blockchains like Ethereum and Polygon require gas fees to run, and testnets mirror that production environment but replace the real tokens with test tokens, minimizing development costs associated and exploit risks. Testnet faucets give developers access to those test tokens. Most faucets require social authentication (e.g. a post on X or a login confirming you are a real human) or place you in a queue to wait for a testnet token through the faucet. However, the Alchemy faucet is free, fast, and does not require authentication.
          - listitem [ref=e66]:
            - button "How to use an Alchemy faucet?" [ref=e67] [cursor=pointer]:
              - generic [ref=e68]:
                - generic [ref=e69]: How to use an Alchemy faucet?
                - img [ref=e71]
            - generic [ref=e73]: To request funds from one of Alchemy's faucets, simply enter your wallet address for that network and hit the send button. To prevent faucet abuse, we've set some eligibility requirements that wallets must meet in order to receive faucet tokens. You can request testnet tokens every 24 hours without authentication.
          - listitem [ref=e74]:
            - button "What are testnet tokens?" [ref=e75] [cursor=pointer]:
              - generic [ref=e76]:
                - generic [ref=e77]: What are testnet tokens?
                - img [ref=e79]
            - generic [ref=e81]: Testnet tokens are a test currency that allows you to test your application before going live in production on mainnet. Testnet tokens can be used in place of mainnet tokens on testnet networks.
          - listitem [ref=e82]:
            - button "The faucet confirmed it sent tokens. Why haven't I received them yet?" [ref=e83] [cursor=pointer]:
              - generic [ref=e84]:
                - generic [ref=e85]: The faucet confirmed it sent tokens. Why haven't I received them yet?
                - img [ref=e87]
            - generic [ref=e89]: The time it takes for you to receive your test tokens may vary. This could be because the network may be congested at that time, or the amount of gas we have set for these transactions may be a little low compared to other transactions that miners may choose to validate instead. Keep an eye on your wallet. Your faucet transaction will land soon enough.
          - listitem [ref=e90]:
            - button "Why is there a daily limit?" [ref=e91] [cursor=pointer]:
              - generic [ref=e92]:
                - generic [ref=e93]: Why is there a daily limit?
                - img [ref=e95]
            - generic [ref=e97]: To prevent abuse and ensure a reliable faucet experience for all users, we apply a daily limit per address. This limit resets every 24 hours.
          - listitem [ref=e98]:
            - button "What are the claim eligibility criteria?" [ref=e99] [cursor=pointer]:
              - generic [ref=e100]:
                - generic [ref=e101]: What are the claim eligibility criteria?
                - img [ref=e103]
            - generic [ref=e105]: To keep the faucet fair and accessible, your wallet must meet a few requirements before you can successfully claim testnet tokens. You need at least 0.001 ETH on Ethereum Mainnet for EVM-based testnets, or an equivalent minimum balance on the corresponding chain mainnet for non-EVM networks. You need sufficient activity on Ethereum Mainnet for EVM-based testnets, or on the corresponding chain mainnet for non-EVM networks, to qualify. This means your wallet must have performed enough real transactions on the relevant mainnet. You need to have a low enough existing testnet balance since wallets with a significant amount of testnet tokens are not eligible for additional claims.
